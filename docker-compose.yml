# ─── Tender Intelligence — Docker Compose ──────────────────────────────
# Full-stack orchestration for development and production.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tender-intelligence
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/db/custom.db
      # For PostgreSQL, use the db service below and set:
      # - DATABASE_URL=postgresql://ti:tipassword@db:5432/tender_intelligence?schema=public
    volumes:
      - ti-db-data:/app/db
      # Mount the Z.ai config for AI features (optional — falls back to heuristics)
      - ${HOME}/.z-ai-config:/etc/.z-ai-config:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/ai-health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ─── Optional: PostgreSQL for production ────────────────────────────
  # Uncomment to use PostgreSQL instead of SQLite. Update DATABASE_URL above.
  #
  # db:
  #   image: postgres:16-alpine
  #   container_name: tender-intelligence-db
  #   environment:
  #     POSTGRES_USER: ti
  #     POSTGRES_PASSWORD: tipassword
  #     POSTGRES_DB: tender_intelligence
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - ti-pg-data:/var/lib/postgresql/data
  #   restart: unless-stopped
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U ti -d tender_intelligence"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

volumes:
  ti-db-data:
  # ti-pg-data:
